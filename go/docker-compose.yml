name: antispam-bot

services:
  bot:
    build: .
    restart: always
    env_file: .env
    # Не запускаем бота, пока PostgreSQL не завершит восстановление после
    # перезапуска и healthcheck не подтвердит готовность принимать запросы.
    # Иначе бот исчерпает стартовые попытки подключения и отключит функции БД.
    depends_on:
      db:
        condition: service_healthy
    # Порт нужен только в режиме webhook (когда в .env задан WEBHOOK_URL).
    # Для Long Polling (режим по умолчанию) секцию ports можно не трогать —
    # бот ничего не слушает и порт не нужен.
    ports:
      - "8080:8080"

  # PostgreSQL для глобального обучения. Если БД не нужна, удалите одновременно
  # эту секцию и depends_on.db у сервиса bot.
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: antispam
      POSTGRES_PASSWORD: antispam
      POSTGRES_DB: antispam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antispam"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
